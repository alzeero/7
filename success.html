  <style>:root{--blue-900:#0d1f6e;--blue-800:#1a3bcc;--blue-700:#2347e0;--blue-600:#3358f4;--blue-500:#4a6cf7;--blue-100:#e8edff;--blue-50:#f0f3ff;--bg:#EEF4FF;--white:#ffffff;--text-900:#0f172a;--text-600:#475569;--text-400:#94a3b8;--border:#e2e8f0;--shadow-lg:0 16px 48px rgba(26,59,204,.18);--radius-lg:24px;--radius-md:16px;--transition:.3s cubic-bezier(.4,0,.2,1);--font-ar:'Cairo',sans-serif;--font-en:'Inter',sans-serif}[data-theme="dark"]{--bg:#0a0f1e;--white:#1e293b;--text-900:#f1f5f9;--text-600:#94a3b8;--text-400:#64748b;--border:#1e293b;--shadow-lg:0 16px 48px rgba(0,0,0,.6)}*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-ar);background:var(--bg);color:var(--text-900);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;transition:background var(--transition),color var(--transition);line-height:1.7}body.en{font-family:var(--font-en)}.success-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:48px 32px;max-width:560px;width:100%;text-align:center;transition:background var(--transition)}.success-logo{height:64px;margin:0 auto 28px;display:block}.success-anim{width:120px;height:120px;margin:0 auto 24px;position:relative}.success-circle{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;transform:scale(0);animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .15s forwards;box-shadow:0 12px 32px rgba(34,197,94,.35)}.success-circle i{font-size:3rem;color:#fff;opacity:0;animation:fadeIn .4s ease .55s forwards}@keyframes popIn{to{transform:scale(1)}}@keyframes fadeIn{to{opacity:1}}.success-ring{position:absolute;inset:0;border-radius:50%;border:3px solid #22c55e;opacity:0;animation:ringPulse 1.4s ease-out .5s infinite}@keyframes ringPulse{0%{opacity:.6;transform:scale(.9)}100%{opacity:0;transform:scale(1.4)}}.success-title{font-size:clamp(1.3rem,4vw,1.7rem);font-weight:800;margin-bottom:14px;line-height:1.4}.success-order-number{display:inline-block;background:var(--blue-50);color:var(--blue-700);font-weight:800;padding:8px 20px;border-radius:99px;margin-bottom:20px;font-size:.95rem;letter-spacing:.02em;direction:ltr}[data-theme="dark"] .success-order-number{background:rgba(74,108,247,.15)}.success-message{color:var(--text-600);margin-bottom:32px;font-size:.98rem}.success-message p{margin-bottom:10px}.success-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}.btn-success-primary,.btn-success-secondary{flex:1;min-width:160px;padding:14px 20px;border-radius:var(--radius-md);font-weight:700;font-size:.95rem;transition:all var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-success-primary{background:linear-gradient(135deg,var(--blue-700),var(--blue-500));color:#fff;box-shadow:0 8px 24px rgba(26,59,204,.3)}.btn-success-primary:hover{transform:translateY(-2px)}.btn-success-secondary{background:var(--bg);color:var(--text-900);border:1.5px solid var(--border)}.btn-success-secondary:hover{border-color:var(--blue-400)}@media(max-width:480px){.success-card{padding:36px 22px}.success-actions{flex-direction:column}}</style>
</head>
<body>

<div class="success-card">
  <img src="assets/images/logo-512.webp" alt="Seven Store" class="success-logo" onerror="this.src='assets/images/logo-512.jpg'" />

  <div class="success-anim">
    <div class="success-ring"></div>
    <div class="success-circle"><i class="fas fa-check"></i></div>
  </div>

  <h1 class="success-title" data-ar="🎉 تم استلام طلبك بنجاح" data-en="🎉 Your Order Has Been Received Successfully">🎉 تم استلام طلبك بنجاح</h1>

  <div class="success-order-number" id="order-number-display" style="display:none;"></div>

  <div class="success-message">
    <p data-ar="شكراً لاختيارك Seven Store." data-en="Thank you for choosing Seven Store.">شكراً لاختيارك Seven Store.</p>
    <p data-ar="لقد تم استلام طلبك بنجاح." data-en="Your order has been received successfully.">لقد تم استلام طلبك بنجاح.</p>
    <p data-ar="سيقوم فريقنا بالتواصل معك قريباً لتأكيد الطلب وإتمام عملية الدفع." data-en="Our team will contact you shortly to confirm your order and complete the payment process.">سيقوم فريقنا بالتواصل معك قريباً لتأكيد الطلب وإتمام عملية الدفع.</p>
    <p data-ar="نقدّر ثقتك ونتمنى لك تجربة ممتعة مع Seven Store." data-en="We appreciate your trust and hope you enjoy your experience with Seven Store.">نقدّر ثقتك ونتمنى لك تجربة ممتعة مع Seven Store.</p>
  </div>

  <div class="success-actions">
    <a href="index.html#products" class="btn-success-primary">
      <i class="fas fa-bag-shopping"></i>
      <span data-ar="الاستمرار في التسوق" data-en="Continue Shopping">الاستمرار في التسوق</span>
    </a>
    <a href="index.html" class="btn-success-secondary">
      <i class="fas fa-house"></i>
      <span data-ar="العودة للرئيسية" data-en="Back to Home">العودة للرئيسية</span>
    </a>
  </div>
</div>

<script src="assets/js/cart.js"></script>
<script>let currentLang = localStorage.getItem('sevenstore-lang') || 'ar'; document.documentElement.lang = currentLang; document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr'; document.body.classList.toggle('en', currentLang === 'en'); document.querySelectorAll('[data-ar]').forEach(el => { el.textContent = currentLang === 'ar' ? el.dataset.ar : el.dataset.en; }); if (localStorage.getItem('sevenstore-dark') === '1') { document.documentElement.setAttribute('data-theme', 'dark'); } cartClear(); const orderNumber = sessionStorage.getItem('sevenstore-last-order'); if (orderNumber) { const display = document.getElementById('order-number-display'); display.textContent = (currentLang === 'ar' ? 'رقم الطلب: ' : 'Order Number: ') + orderNumber; display.style.display = 'inline-block'; sessionStorage.removeItem('sevenstore-last-order'); }</script>
