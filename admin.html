admin-shell{display:none}.admin-topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.admin-topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800}.admin-topbar .brand img{height:34px}.btn-logout{font-size:.85rem;font-weight:700;color:var(--text-600);padding:8px 16px;border-radius:99px;border:1.5px solid var(--border);transition:all var(--transition)}.btn-logout:hover{border-color:#dc2626;color:#dc2626}.admin-main{max-width:1320px;margin:0 auto;padding:28px 20px 60px}.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}.stat-card{background:var(--white);border-radius:var(--radius-md);padding:18px;box-shadow:var(--shadow-sm)}.stat-card .stat-label{font-size:.8rem;color:var(--text-400);margin-bottom:6px}.stat-card .stat-value{font-size:1.5rem;font-weight:800}.toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px;align-items:center}.toolbar input,.toolbar select{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--white);font-size:.9rem;color:var(--text-900)}.toolbar input{flex:1;min-width:200px}.btn-refresh{padding:10px 16px;border-radius:var(--radius-sm);background:var(--bg-soft);color:var(--text-600);font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:6px}.btn-refresh:hover{background:var(--blue-700);color:#fff}.orders-table-wrap{background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:.88rem;min-width:880px}th{text-align:right;padding:14px 16px;background:var(--bg-soft);font-weight:700;color:var(--text-600);white-space:nowrap;font-size:.8rem}td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:top}tr:last-child td{border-bottom:none}tr.order-row{cursor:pointer;transition:background var(--transition)}tr.order-row:hover{background:var(--bg-soft)}.order-num{font-weight:700;direction:ltr;display:inline-block}.status-badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:.75rem;font-weight:700}.status-pending{background:#fef3c7;color:#92400e}.status-confirmed{background:#dbeafe;color:#1e40af}.status-completed{background:#dcfce7;color:#166534}.status-cancelled{background:#fee2e2;color:#991b1b}[data-theme="dark"] .status-pending{background:rgba(146,64,14,.25);color:#fcd34d}[data-theme="dark"] .status-confirmed{background:rgba(30,64,175,.25);color:#93c5fd}[data-theme="dark"] .status-completed{background:rgba(22,101,52,.25);color:#86efac}[data-theme="dark"] .status-cancelled{background:rgba(153,27,27,.25);color:#fca5a5}.empty-row td{text-align:center;padding:48px;color:var(--text-400)}#order-modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}#order-modal-overlay.open{display:flex}#order-modal-box{background:var(--white);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:28px}#order-modal-box h2{font-size:1.2rem;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}.detail-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem}.detail-row .k{color:var(--text-400);flex-shrink:0}.detail-row .v{font-weight:600;text-align:left}.detail-items{margin-top:14px}.detail-item-row{display:flex;justify-content:space-between;font-size:.85rem;padding:8px 0;border-bottom:1px dashed var(--border)}.status-select{width:100%;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-top:14px;font-size:.9rem}.btn-close-modal{width:32px;height:32px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center}.status-select-inline{padding:6px 10px;border-radius:99px;border:1.5px solid var(--border);font-size:.75rem;font-weight:700;background:var(--white);color:var(--text-900);cursor:pointer}.modal-actions-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}.btn-modal-action{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:700;transition:all var(--transition)}.btn-whatsapp-order{background:#25d366;color:#fff}.btn-whatsapp-order:hover{opacity:.9}.btn-copy-phone{background:var(--bg-soft);color:var(--text-600)}.btn-copy-phone:hover{background:var(--blue-700);color:#fff}.btn-delete-order{background:#fee2e2;color:#991b1b}.btn-delete-order:hover{background:#dc2626;color:#fff}.admin-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-900);color:#fff;padding:12px 22px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;box-shadow:var(--shadow-md);z-index:99999;opacity:0;transition:opacity .25s ease,transform .25s ease;pointer-events:none;max-width:90vw;text-align:center}.admin-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.admin-toast.success{background:#166534}.admin-toast.error{background:#991b1b}@media(max-width:640px){.admin-main{padding:20px 12px 40px}}</style>

<body>

<div id="login-screen">
  <div class="login-card">
    <img src="assets/images/logo-512.webp" alt="Seven Store" onerror="this.src='assets/images/logo-512.jpg'" />
    <h1>لوحة تحكم Seven Store</h1>
    <div class="login-error" id="login-error">بيانات الدخول غير صحيحة</div>
    <form id="login-form">
      <div class="form-group">
        <label for="admin-email">البريد الإلكتروني</label>
        <input type="email" id="admin-email" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="admin-password">كلمة المرور</label>
        <input type="password" id="admin-password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="login-btn">تسجيل الدخول</button>
    </form>
  </div>
</div>

<div id="admin-shell">
  <div class="admin-topbar">
    <div class="brand">
      <img src="assets/images/logo-512.webp" alt="Seven Store" onerror="this.src='assets/images/logo-512.jpg'" />
      <span>لوحة التحكم</span>
    </div>
    <button class="btn-logout" id="logout-btn"><i class="fas fa-arrow-right-from-bracket"></i> تسجيل الخروج</button>
  </div>

  <div class="admin-main">
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">إجمالي الطلبات</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">قيد الانتظار</div><div class="stat-value" id="stat-pending">0</div></div>
      <div class="stat-card"><div class="stat-label">مكتملة</div><div class="stat-value" id="stat-completed">0</div></div>
      <div class="stat-card"><div class="stat-label">إجمالي المبيعات</div><div class="stat-value" id="stat-revenue">0 ر.س</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="search-orders" placeholder="بحث برقم الطلب، الاسم أو الجوال..." />
      <select id="filter-status">
        <option value="">كل الحالات</option>
        <option value="pending">قيد الانتظار</option>
        <option value="confirmed">مؤكد</option>
        <option value="completed">مكتمل</option>
        <option value="cancelled">ملغي</option>
      </select>
      <button class="btn-refresh" id="refresh-btn"><i class="fas fa-rotate"></i> تحديث</button>
    </div>

    <div class="orders-table-wrap">
      <table>
        <thead>
          <tr>
            <th>رقم الطلب</th>
            <th>العميل</th>
            <th>الجوال</th>
            <th>المنتجات</th>
            <th>الإجمالي</th>
            <th>الدفع</th>
            <th>الحالة</th>
            <th>التاريخ</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr class="empty-row"><td colspan="8"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="order-modal-overlay">
  <div id="order-modal-box">
    <h2>
      <span id="modal-order-num"></span>
      <button class="btn-close-modal" id="order-modal-close"><i class="fas fa-times"></i></button>
    </h2>
    <div id="order-modal-body"></div>
  </div>
</div>

<script src="assets/js/supabase-client.js"></script>
<script>function escapeHtml(value) { if (value === null || value === undefined) return ''; return String(value) .replace(/&/g, '&amp;') .replace(/</g, '&lt;') .replace(/>/g, '&gt;') .replace(/"/g, '&quot;')
.replace(/'/g, '&#039;');
}
const PAYMENT_LABELS = {
bank_transfer: 'حوالة بنكية',
barq: 'برق',
bank_cards: 'بطاقات بنكية (مدى/فيزا/ماستركارد)'
};
const STATUS_LABELS = {
pending: 'قيد الانتظار',
confirmed: 'مؤكد',
completed: 'مكتمل',
cancelled: 'ملغي'
};
let allOrders = [];
/* ------------------------------------------------------------
AUTH GATE
------------------------------------------------------------ */
async function checkAuthAndInit() {
const session = await adminGetSession();
if (session) {
showDashboard();
} else {
document.getElementById('login-screen').style.display = 'flex';
}
}
document.getElementById('login-form').addEventListener('submit', async (e) => {
e.preventDefault();
const email = document.getElementById('admin-email').value.trim();
const password = document.getElementById('admin-password').value;
const errorEl = document.getElementById('login-error');
const btn = document.getElementById('login-btn');
btn.disabled = true;
btn.textContent = 'جاري تسجيل الدخول...';
errorEl.style.display = 'none';
const result = await adminSignIn(email, password);
btn.disabled = false;
btn.textContent = 'تسجيل الدخول';
if (result.success) {
showDashboard();
} else {
errorEl.textContent = 'بيانات الدخول غير صحيحة أو الحساب غير مفعّل';
errorEl.style.display = 'block';
}
});
document.getElementById('logout-btn').addEventListener('click', async () => {
await adminSignOut();
document.getElementById('admin-shell').style.display = 'none';
document.getElementById('login-screen').style.display = 'flex';
});
function showDashboard() {
document.getElementById('login-screen').style.display = 'none';
document.getElementById('admin-shell').style.display = 'block';
loadOrders();
}
/* ------------------------------------------------------------
ORDERS LOADING / RENDERING
------------------------------------------------------------ */
async function loadOrders() {
const tbody = document.getElementById('orders-tbody');
tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>';
const result = await fetchAllOrders();
if (!result.success) {
tbody.innerHTML = `<tr class="empty-row"><td colspan="8">
تعذّر تحميل الطلبات. تأكد من تسجيل الدخول وأن صلاحيات RLS مفعّلة بشكل صحيح.<br>
<small>${result.error || ''}</small>
</td></tr>`;
return;
}
allOrders = result.orders.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
renderStats();
renderOrdersTable();
}
/* ------------------------------------------------------------
TOAST NOTIFICATIONS
------------------------------------------------------------ */
function formatSaudiWhatsappNumber(raw) {
let digits = String(raw || '').replace(/[^0-9]/g, '');
digits = digits.replace(/^0+/, '');
if (!digits) return '';
if (!digits.startsWith('966')) {
digits = '966' + digits;
}
return digits;
}
let adminToastTimeout;
function showAdminToast(message, type) {
let toast = document.getElementById('admin-toast');
if (!toast) {
toast = document.createElement('div');
toast.id = 'admin-toast';
document.body.appendChild(toast);
}
toast.textContent = message;
toast.className = 'admin-toast show ' + (type || '');
clearTimeout(adminToastTimeout);
adminToastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2800);
}
/* ------------------------------------------------------------
INLINE STATUS UPDATE (orders table)
------------------------------------------------------------ */
async function handleInlineStatusChange(selectEl) {
const orderId = selectEl.dataset.orderId;
const newStatus = selectEl.value;
selectEl.disabled = true;
const result = await updateOrderStatus(orderId, newStatus);
selectEl.disabled = false;
if (result.success) {
const order = allOrders.find(o => String(o.id) === String(orderId));
if (order) order.status = newStatus;
renderStats();
renderOrdersTable();
showAdminToast('تم تحديث حالة الطلب بنجاح', 'success');
} else {
renderOrdersTable();
showAdminToast('تعذّر تحديث الحالة: ' + (result.error || 'خطأ غير معروف'), 'error');
}
}
/* ------------------------------------------------------------
DELETE ORDER
------------------------------------------------------------ */
async function deleteOrderById(orderId) {
  try {
    console.log("Deleting order:", orderId);

    const { data, error } = await supabase
      .from('orders')
      .delete()
      .eq('id', orderId)
      .select();

    alert("Error: " + JSON.stringify(error));
    alert("Data: " + JSON.stringify(data));

    return {
      success: !error,
      error: error?.message || null
    };
  } catch (e) {
    alert("EXCEPTION: " + e.message);
    return {
      success: false,
      error: e.message
    };
  }
  }
function renderStats() {
document.getElementById('stat-total').textContent = allOrders.length;
document.getElementById('stat-pending').textContent = allOrders.filter(o => o.status === 'pending').length;
document.getElementById('stat-completed').textContent = allOrders.filter(o => o.status === 'completed').length;
const revenue = allOrders
.filter(o => o.status !== 'cancelled')
.reduce((sum, o) => sum + Number(o.total_price || 0), 0);
document.getElementById('stat-revenue').textContent = revenue.toFixed(2) + ' ر.س';
}
function getFilteredOrders() {
const q = document.getElementById('search-orders').value.trim().toLowerCase();
const statusFilter = document.getElementById('filter-status').value;
return allOrders.filter(o => {
if (statusFilter && o.status !== statusFilter) return false;
if (q) {
const haystack = `${o.order_number} ${o.customer_name} ${o.mobile_number}`.toLowerCase();
if (!haystack.includes(q)) return false;
}
return true;
});
}
function formatDate(iso) {
try {
const d = new Date(iso);
const parts = new Intl.DateTimeFormat('ar-SA-u-ca-gregory-nu-latn', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(d);
const get = (type) => parts.find(p => p.type === type)?.value || '';
return `${get('day')}/${get('month')}/${get('year')} ${get('hour')}:${get('minute')}`;
} catch {
return iso;
}
}
function renderOrdersTable() {
const tbody = document.getElementById('orders-tbody');
const list = getFilteredOrders();
if (!list.length) {
tbody.innerHTML = '<tr class="empty-row"><td colspan="8">لا توجد طلبات مطابقة</td></tr>';
return;
}
tbody.innerHTML = list.map(o => {
const items = Array.isArray(o.items) ? o.items : [];
const productsSummary = items.map(i => `${escapeHtml(i.product_name)} ×${escapeHtml(i.qty)}`).join('، ');
return `
<tr class="order-row" onclick="openOrderDetail('${o.id}')">
<td><span class="order-num">${escapeHtml(o.order_number)}</span></td>
<td>${escapeHtml(o.customer_name)}</td>
<td style="direction:ltr;text-align:right;">${escapeHtml(o.mobile_number)}</td>
<td>${productsSummary || '—'}</td>
<td>${Number(o.total_price).toFixed(2)} ر.س</td>
<td>${PAYMENT_LABELS[o.payment_method] || escapeHtml(o.payment_method)}</td>
<td onclick="event.stopPropagation()"><select class="status-select-inline status-${o.status}" data-order-id="${o.id}" onchange="handleInlineStatusChange(this)" onclick="event.stopPropagation()">
${Object.entries(STATUS_LABELS).map(([val, label]) => `<option value="${val}" ${val === o.status ? 'selected' : ''}>${label}</option>`).join('')}
</select></td>
<td>${formatDate(o.created_at)}</td>
</tr>`;
}).join('');
}
document.getElementById('search-orders').addEventListener('input', renderOrdersTable);
document.getElementById('filter-status').addEventListener('change', renderOrdersTable);
document.getElementById('refresh-btn').addEventListener('click', loadOrders);
/* ------------------------------------------------------------
ORDER DETAIL MODAL
------------------------------------------------------------ */
function openOrderDetail(orderId) {
const order = allOrders.find(o => String(o.id) === String(orderId));
if (!order) return;
document.getElementById('modal-order-num').textContent = order.order_number;
const items = Array.isArray(order.items) ? order.items : [];
const body = document.getElementById('order-modal-body');
body.innerHTML = `
<div class="detail-row"><span class="k">العميل</span><span class="v">${escapeHtml(order.customer_name)}</span></div>
<div class="detail-row"><span class="k">الجوال</span><span class="v" style="direction:ltr;">${escapeHtml(order.mobile_number)}</span></div>
<div class="detail-row"><span class="k">البريد الإلكتروني</span><span class="v" style="direction:ltr;">${escapeHtml(order.email) || '—'}</span></div>
<div class="detail-row"><span class="k">ملاحظات</span><span class="v">${escapeHtml(order.notes) || '—'}</span></div>
<div class="detail-row"><span class="k">طريقة الدفع</span><span class="v">${PAYMENT_LABELS[order.payment_method] || escapeHtml(order.payment_method)}</span></div>
<div class="detail-row"><span class="k">التاريخ</span><span class="v">${formatDate(order.created_at)}</span></div>
<div class="detail-row"><span class="k">الإجمالي</span><span class="v">${Number(order.total_price).toFixed(2)} ر.س</span></div>
${order.receipt_url ? `<div class="detail-row"><span class="k">إيصال الدفع</span><span class="v"><a href="${escapeHtml(order.receipt_url)}" target="_blank" rel="noopener">عرض الإيصال</a></span></div><a href="${escapeHtml(order.receipt_url)}" target="_blank" rel="noopener"><img src="${escapeHtml(order.receipt_url)}" alt="Receipt" style="max-width:220px;border-radius:10px;border:1px solid var(--border,#e2e8f0);margin:8px 0;display:block;" /></a>` : ''}
<div class="detail-items">
<div class="detail-row"><span class="k" style="font-weight:700;">المنتجات المطلوبة</span></div>
${items.map(i => `<div class="detail-item-row"><span>${escapeHtml(i.product_name)} ×${escapeHtml(i.qty)}</span><span>${Number(i.subtotal || i.price * i.qty).toFixed(2)} ر.س</span></div>`).join('')}
</div>
<label style="display:block;margin-top:16px;font-size:.85rem;font-weight:700;color:var(--text-600);">تحديث حالة الطلب</label>
<select class="status-select" id="status-update-select" data-order-id="${order.id}">
${Object.entries(STATUS_LABELS).map(([val, label]) =>
`<option value="${val}" ${val === order.status ? 'selected' : ''}>${label}</option>`
).join('')}
</select>
<div class="modal-actions-row">
<button type="button" class="btn-modal-action btn-whatsapp-order" id="modal-whatsapp-btn"><i class="fab fa-whatsapp"></i> واتساب</button>
<button type="button" class="btn-modal-action btn-copy-phone" id="modal-copy-phone-btn"><i class="fas fa-copy"></i> نسخ الجوال</button>
<button type="button" class="btn-modal-action btn-delete-order" id="modal-delete-btn"><i class="fas fa-trash"></i> حذف الطلب</button>
</div>
`;
document.getElementById('modal-whatsapp-btn').addEventListener('click', () => {
const formatted = formatSaudiWhatsappNumber(order.mobile_number);
if (!formatted) { showAdminToast('رقم الجوال غير متوفر', 'error'); return; }
window.open('https://wa.me/' + formatted, '_blank', 'noopener');
});
document.getElementById('modal-copy-phone-btn').addEventListener('click', async () => {
try {
await navigator.clipboard.writeText(order.mobile_number || '');
showAdminToast('تم نسخ رقم الجوال', 'success');
} catch (err) {
showAdminToast('تعذّر نسخ رقم الجوال', 'error');
}
});
document.getElementById('modal-delete-btn').addEventListener('click', async () => {
if (!confirm('هل أنت متأكد من حذف هذا الطلب؟ لا يمكن التراجع عن هذا الإجراء.')) return;
const delBtn = document.getElementById('modal-delete-btn');
delBtn.disabled = true;
const result = await deleteOrderById(order.id);
delBtn.disabled = false;
if (result.success) {
document.getElementById('order-modal-overlay').classList.remove('open');
showAdminToast('تم حذف الطلب بنجاح', 'success');
loadOrders();
} else {
showAdminToast('تعذّر حذف الطلب: ' + (result.error || 'خطأ غير معروف'), 'error');
}
});
document.getElementById('status-update-select').addEventListener('change', async (e) => {
const newStatus = e.target.value;
const orderId = e.target.dataset.orderId;
e.target.disabled = true;
const result = await updateOrderStatus(orderId, newStatus);
e.target.disabled = false;
if (result.success) {
order.status = newStatus;
renderStats();
renderOrdersTable();
showAdminToast('تم تحديث حالة الطلب بنجاح', 'success');
} else {
showAdminToast('تعذّر تحديث الحالة: ' + (result.error || 'خطأ غير معروف'), 'error');
}
});
document.getElementById('order-modal-overlay').classList.add('open');
}
document.getElementById('order-modal-close').addEventListener('click', () => {
document.getElementById('order-modal-overlay').classList.remove('open');
});
document.getElementById('order-modal-overlay').addEventListener('click', (e) => {
if (e.target === e.currentTarget) {
document.getElementById('order-modal-overlay').classList.remove('open');
}
});
if (localStorage.getItem('sevenstore-dark') === '1') {
document.documentElement.setAttribute('data-theme', 'dark');
}
checkAuthAndInit();</script>
</body>
</html>
